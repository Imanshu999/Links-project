<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takano3D - Official Social Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #0f172a; 
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .custom-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .custom-hover:hover { transform: translateY(-3px); }

        /* Strict CSS for Admin Modal */
        #admin-modal.hidden {
            display: none !important;
        }
        #admin-modal {
            display: flex;
            background: rgba(0, 0, 0, 0.85);
        }
        
        .dark-input {
            background-color: #111827 !important;
            border: 1px solid #374151 !important;
            color: #ffffff !important;
            padding: 10px 14px;
            border-radius: 10px;
            width: 100%;
            outline: none;
        }
        .dark-input:focus {
            border-color: #38bdf8 !important;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between items-center p-4">

    <button onclick="toggleAdminModal()" class="absolute top-4 right-4 text-slate-400 hover:text-sky-400 text-xl transition-colors z-40 bg-slate-800/80 p-2 rounded-lg border border-slate-700">
        <i class="fas fa-cog"></i>
    </button>

    <div class="w-full max-w-md glass-card rounded-3xl p-6 sm:p-8 shadow-2xl my-auto mt-14">
        
        <div class="text-center mb-8">
            <div class="relative w-28 h-28 mx-auto mb-4 rounded-full p-1 bg-gradient-to-tr from-sky-400 to-purple-500 shadow-xl">
                <img id="user-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=Imanshu" alt="Avatar" class="w-full h-full rounded-full object-cover bg-slate-900">
            </div>
            <h1 id="user-name" class="text-2xl font-bold tracking-wide">Imanshu N</h1>
            <p id="user-bio" class="text-sm text-slate-400 mt-2 px-2 leading-relaxed">
                Connect with me across all my official platforms. Click any link below to drop a message!
            </p>
        </div>

        <div id="links-list" class="flex flex-col gap-3.5">
            </div>

        <div class="text-center text-xs text-slate-500 tracking-wider mt-8">
            Takano3D © 2026
        </div>
    </div>

    <div id="admin-modal" class="hidden fixed inset-0 backdrop-blur-sm flex justify-center items-center p-4 z-50">
        <div class="w-full max-w-md bg-slate-800 rounded-2xl border border-slate-700 p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-sky-400"><i class="fas fa-user-shield mr-2"></i>Takano Admin Panel</h2>
                <button onclick="toggleAdminModal()" class="text-slate-400 hover:text-rose-400 text-2xl font-bold">×</button>
            </div>

            <div class="space-y-4 mb-6 border-b border-slate-700 pb-6">
                <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Update Profile</h3>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Name</label>
                    <input type="text" id="input-name" class="dark-input">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Bio</label>
                    <textarea id="input-bio" rows="2" class="dark-input"></textarea>
                </div>
                <button onclick="updateProfileInDB()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors mt-2">
                    Update Profile Info
                </button>
            </div>

            <div class="space-y-4">
                <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Add New Link</h3>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="input-platform" placeholder="Platform Name" class="dark-input">
                    <input type="text" id="input-icon" placeholder="Icon (fab fa-whatsapp)" class="dark-input">
                </div>
                <input type="text" id="input-url" placeholder="URL / Link" class="dark-input">
                <div class="flex items-center gap-3 pt-1">
                    <label class="text-xs text-slate-400">Button Hover Color:</label>
                    <input type="color" id="input-color" value="#38bdf8" class="h-10 w-20 bg-slate-900 border border-slate-700 rounded-lg p-1 cursor-pointer">
                </div>
                
                <button onclick="addNewLinkToDB()" class="w-full bg-sky-500 hover:bg-sky-600 text-slate-900 font-semibold py-2.5 rounded-lg text-sm transition-colors mt-2">
                    Save to Cloud Database
                </button>
            </div>

            <div class="mt-6">
                <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Live Links in Cloud</h3>
                <div id="admin-links-list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 100% Active & Public Open Rules Database for Takano3D Hub
        const firebaseConfig = {
            databaseURL: "https://takano3d-social-hub-99-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const profileRef = ref(db, 'profile');
        const linksRef = ref(db, 'links');

        // Fail-safe default links array
        const defaultLinks = [
            { name: "Instagram", url: "https://www.instagram.com/xi_r7.czx_?igsh=N3VwbDNzMGs5OWps", icon: "fab fa-instagram", color: "#e1306c" },
            { name: "Telegram Chat", url: "https://t.me/Imaanshu_N", icon: "fab fa-telegram-plane", color: "#0088cc" },
            { name: "WhatsApp Chat", url: "https://wa.me/917027232067", icon: "fab fa-whatsapp", color: "#25d366" },
            { name: "Spotify Profile", url: "https://open.spotify.com/user/31izkcubi4jczr5ynuby4ckj4fji?si=jQZJy-cPRBWuoXaZEzYP2Q", icon: "fab fa-spotify", color: "#1ed760" },
            { name: "YouTube Channel", url: "https://youtube.com/@missmarquitoff200", icon: "fab fa-youtube", color: "#ff0000" },
            { name: "Gameram Profile", url: "https://web.gameram.com/profile/S_O_N_G__R7", icon: "fas fa-gamepad", color: "#ff5722" },
            { name: "Email Me", url: "mailto:n4062226@gmail.com", icon: "fas fa-envelope", color: "#ea4335" },
            { name: "X / Twitter", url: "https://x.com/MasterGame79320", icon: "fab fa-x-twitter", color: "#1da1f2" },
            { name: "Facebook", url: "https://www.facebook.com/share/1Cyrw5i4Ba/", icon: "fab fa-facebook-f", color: "#1877f2" },
            { name: "Microsoft Profile", url: "https://share.google/pflhVlW3zhiFetCug", icon: "fab fa-windows", color: "#00a4ef" },
            { name: "Google Share", url: "https://share.google/61o62zTBDep1Uk2yO", icon: "fab fa-google", color: "#ea4335" }
        ];

        // Core Render Function
        function uiRenderEngine(linksData) {
            const linksList = document.getElementById('links-list');
            const adminLinksList = document.getElementById('admin-links-list');
            linksList.innerHTML = '';
            adminLinksList.innerHTML = '';

            Object.keys(linksData).forEach((key) => {
                const link = linksData[key];
                
                // Render Public Links
                const a = document.createElement('a');
                a.href = link.url;
                a.target = link.url.startsWith('mailto:') ? '_self' : '_blank';
                a.className = "custom-hover flex items-center justify-between p-3.5 px-5 bg-slate-800/50 rounded-xl border border-slate-700/50 group relative overflow-hidden transition-all duration-300 text-slate-200";
                
                a.onmouseenter = () => { 
                    a.style.backgroundColor = link.color; 
                    a.style.borderColor = 'transparent';
                    a.style.boxShadow = `0 10px 20px ${link.color}40`;
                    if(link.color.toLowerCase() === '#1ed760') a.style.color = '#000';
                };
                a.onmouseleave = () => { a.style.backgroundColor = ''; a.style.borderColor = ''; a.style.boxShadow = ''; a.style.color = ''; };

                a.innerHTML = `
                    <div class="flex items-center gap-4">
                        <i class="${link.icon} text-lg w-6 text-center"></i>
                        <span class="text-sm font-medium tracking-wide">${link.name}</span>
                    </div>
                    <i class="fas fa-chevron-right text-xs opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all"></i>
                `;
                linksList.appendChild(a);

                // Render Admin Manage Panel Links
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-slate-900 p-2.5 px-4 rounded-lg text-xs border border-slate-700 mt-2 text-slate-300";
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <i class="${link.icon}" style="color: ${link.color}"></i>
                        <span>${link.name}</span>
                    </div>
                    <button onclick="window.deleteLinkFromDB('${key}')" class="text-rose-400 hover:text-rose-600 p-1"><i class="fas fa-trash-alt"></i></button>
                `;
                adminLinksList.appendChild(div);
            });
        }

        // Sync Profile Data from Cloud
        onValue(profileRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('user-name').innerText = data.name;
                document.getElementById('user-bio').innerText = data.bio;
                document.getElementById('input-name').value = data.name;
                document.getElementById('input-bio').value = data.bio;
            } else {
                set(profileRef, {
                    name: "Imanshu N",
                    bio: "Connect with me across all my official platforms. Click any link below to drop a message!",
                    avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Imanshu"
                });
            }
        });

        // Sync Links from Cloud Database
        onValue(linksRef, (snapshot) => {
            const data = snapshot.val();
            if (data && Object.keys(data).length > 0) {
                uiRenderEngine(data);
            } else {
                // If cloud database is fresh/empty, seed the default 11 links
                defaultLinks.forEach(l => push(linksRef, l));
            }
        }, (error) => {
            console.log("Firebase sync fallback triggered.");
            uiRenderEngine(defaultLinks);
        });

        // Fail-safe: Render local backup array immediately so page is never blank
        uiRenderEngine(defaultLinks);

        // Global Operations
        window.updateProfileInDB = function() {
            const name = document.getElementById('input-name').value.trim();
            const bio = document.getElementById('input-bio').value.trim();
            if(name && bio) {
                set(profileRef, { name, bio, avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Imanshu" })
                .then(() => {
                    alert("Profile synced to cloud successfully!");
                    toggleAdminModal();
                });
            }
        }

        window.addNewLinkToDB = function() {
            const name = document.getElementById('input-platform').value.trim();
            const icon = document.getElementById('input-icon').value.trim() || 'fas fa-link';
            const url = document.getElementById('input-url').value.trim();
            const color = document.getElementById('input-color').value;

            if(name && url) {
                push(linksRef, { name, icon, url, color });
                document.getElementById('input-platform').value = '';
                document.getElementById('input-icon').value = '';
                document.getElementById('input-url').value = '';
            } else {
                alert("Please enter Name and URL!");
            }
        }

        window.deleteLinkFromDB = function(key) {
            if(confirm("Delete this link from Cloud Database permanently?")) {
                remove(ref(db, `links/${key}`));
            }
        }
    </script>

    <script>
        function toggleAdminModal() {
            const modal = document.getElementById('admin-modal');
            modal.classList.toggle('hidden');
        }
    </script>
</body>
</html>
